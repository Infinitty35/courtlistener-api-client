name: API Check

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  api-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra mcp

      - name: Regenerate models from the live API
        run: uv run python scripts/generate_models.py --no-cache
        env:
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}

      - name: Regenerate docs
        run: |
          uv run python scripts/update_tool_docs.py
          uv run python scripts/update_endpoint_docs.py

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/api-check
          delete-branch: true
          commit-message: "feat(models): regenerate models from live API"
          title: "Update generated models from live API"
          labels: no changelog
          body: |
            Automated model regeneration: the live API's HTTP OPTIONS
            differ from the checked-in `docs/api/http_options.json`.

            This PR was generated by the `API Check` workflow from
            `scripts/generate_models.py --no-cache` plus the two
            documentation scripts. Review the diff for unexpected
            contract changes before merging — generated model changes
            can silently change MCP tool schemas.

            > [!NOTE]
            > CI does not run automatically on PRs created by a
            > workflow's `GITHUB_TOKEN`. Close and reopen this PR (or
            > push any commit to it) to trigger the CI checks.
